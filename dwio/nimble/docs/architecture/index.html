<script>
function ntabSw(i, el) {
  document.querySelectorAll('.ntab').forEach(t => t.classList.remove('ntab-active'));
  document.querySelectorAll('.nframe').forEach(f => f.style.display = 'none');
  el.classList.add('ntab-active');
  document.getElementById('nf-' + i).style.display = 'block';
}
